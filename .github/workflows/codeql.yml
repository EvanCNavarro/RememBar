name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 5 * * 1" # weekly, Monday 05:23 UTC

jobs:
  analyze:
    name: Analyze (Swift)
    runs-on: macos-14
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Vendor Sparkle (required for the build)
        run: ./scripts/fetch-sparkle.sh

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift

      - name: Build
        run: swift build

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:swift"
