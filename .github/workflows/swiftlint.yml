name: SwiftLint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - name: Lint
        run: |
          command -v swiftlint >/dev/null || brew install swiftlint
          swiftlint lint --reporter github-actions-logging
