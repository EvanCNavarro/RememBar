name: Release

# Tag a version (e.g. `git tag v0.1.0 && git push origin v0.1.0`) to cut a release:
# builds the app in CI (so the download has verifiable provenance), scans it with VirusTotal,
# generates an EdDSA-signed Sparkle appcast, and publishes everything to a GitHub Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the release
  id-token: write # build provenance
  attestations: write # build provenance

env:
  SPARKLE_VERSION: "2.9.3"

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Use latest Xcode (Swift 6 toolchain)
        run: |
          LATEST="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$LATEST" ] && sudo xcode-select -s "$LATEST"
          swift --version

      - name: Vendor Sparkle framework + fetch CLI tools
        run: |
          ./scripts/fetch-sparkle.sh
          curl -fsSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle-tools && tar xf /tmp/sparkle.tar.xz -C /tmp/sparkle-tools

      - name: Build app (release)
        run: |
          CONFIGURATION=release \
          REMEMBAR_VERSION="${GITHUB_REF_NAME#v}" \
          REMEMBAR_DIST_DIR="$PWD/dist" \
          ./scripts/build-remembar-app.sh

      - name: Package + checksum
        id: pkg
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd dist
          ditto -c -k --keepParent "RememBar.app" "RememBar.zip"
          SHA="$(shasum -a 256 RememBar.zip | awk '{print $1}')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA"     >> "$GITHUB_OUTPUT"

      - name: Stage release notes for this version
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SRC="release-notes/${VERSION}.md"
          if [ -f "$SRC" ]; then
            # Named to match the archive (RememBar.zip) so generate_appcast picks it up as this
            # item's notes, and embeds them inline (next step). Same file feeds the Release body.
            cp "$SRC" dist/RememBar.md
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
            echo "Staged $SRC -> dist/RememBar.md"
          else
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No $SRC — release will ship without a 'What's new' section."
          fi

      - name: Generate EdDSA-signed appcast
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > /tmp/ed_private.key
          # --embed-release-notes inlines dist/RememBar.md into the item's <description> as markdown
          # CDATA (the custom driver reads appcastItem.itemDescription). Without it, a .md would become
          # an external releaseNotesLink pointing at an asset we don't upload — a 404.
          /tmp/sparkle-tools/bin/generate_appcast \
            --ed-key-file /tmp/ed_private.key \
            --embed-release-notes \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/" \
            dist/
          rm -f /tmp/ed_private.key
          test -f dist/appcast.xml
          # The notes file is embedded now; it must not ship as a loose release asset.
          rm -f dist/RememBar.md

      - name: VirusTotal scan
        id: vt
        env:
          VT_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          ID="$(curl -s --request POST --url https://www.virustotal.com/api/v3/files \
            --header "x-apikey: $VT_API_KEY" \
            --form file=@dist/RememBar.zip \
            | python3 -c 'import sys,json; print(json.load(sys.stdin)["data"]["id"])')"
          echo "url=https://www.virustotal.com/gui/file-analysis/${ID}" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        # Free only on public repos; skip while the repo is still private (it'll run once public).
        if: ${{ github.event.repository.private == false }}
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/RememBar.zip

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          {
            echo "## RememBar ${VERSION}"
            echo
            # Same source as the embedded appcast notes — one place to author "What's new".
            if [ "${{ steps.notes.outputs.has_notes }}" = "true" ]; then
              echo "### What's new"
              cat "release-notes/${VERSION}.md"
              echo
            fi
            echo "### Verify this download"
            echo "- **SHA-256:** \`${{ steps.pkg.outputs.sha256 }}\`"
            echo "- **VirusTotal:** ${{ steps.vt.outputs.url }}"
            echo "- **Provenance:** \`gh attestation verify RememBar.zip --repo ${GITHUB_REPOSITORY}\`"
            echo
            echo "Built in GitHub Actions from \`${GITHUB_SHA}\`. Auto-updates are EdDSA-signed."
          } > /tmp/notes.md
          gh release create "${GITHUB_REF_NAME}" \
            dist/RememBar.zip dist/appcast.xml \
            --title "RememBar ${{ steps.pkg.outputs.version }}" \
            --notes-file /tmp/notes.md
